        // Story Cover Image Loader (returns raw data:svg or standard img element with error fallback)
        function getStoryCover(story, size = 'large') {
            if (!story || !story.cover) {
                return `<svg xmlns='http://www.w3.org/2000/svg' width='100%' height='100%' viewBox='0 0 400 300'><rect width='100%' height='100%' fill='%23FFF9EE'/><text x='50%' y='55%' font-size='50' text-anchor='middle'>📖</text></svg>`;
            }
            if (story.cover.startsWith('data:')) {
                let cov = story.cover;
                if (size === 'small') {
                    cov = cov.replace(/width=['"]400['"]/g, "width='120'")
                             .replace(/height=['"]300['"]/g, "height='90'")
                             .replace(/width=['"]800['"]/g, "width='120'")
                             .replace(/height=['"]600['"]/g, "height='90'")
                             .replace(/font-size=['"]70['"]/g, "font-size='30'")
                             .replace(/font-size=['"]22['"]/g, "font-size='8'")
                             .replace(/font-size=['"]100['"]/g, "font-size='30'")
                             .replace(/font-size=['"]28['"]/g, "font-size='8'");
                } else if (size === 'medium') {
                    cov = cov.replace(/width=['"]400['"]/g, "width='200'")
                             .replace(/height=['"]300['"]/g, "height='150'")
                             .replace(/width=['"]800['"]/g, "width='200'")
                             .replace(/height=['"]600['"]/g, "height='150'")
                             .replace(/font-size=['"]70['"]/g, "font-size='30'")
                             .replace(/font-size=['"]22['"]/g, "font-size='12'")
                             .replace(/font-size=['"]100['"]/g, "font-size='30'")
                             .replace(/font-size=['"]28['"]/g, "font-size='12'");
                }
                return `<img src="${cov}" class="w-full h-full object-cover">`;
            }
            return `<img src="${story.cover}" class="w-full h-full object-cover" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100%\' height=\'100%\' viewBox=\'0 0 400 300\'><rect width=\'100%\' height=\'100%\' fill=\'%23FFF9EE\'/><text x=\'50%\' y=\'55%\' font-size=\'50\' text-anchor=\'middle\'>📖</text></svg>';">`;
        }

        // Web Audio API Ambient Music Box Synth (Bedtime Mode)
        const BedtimeSynth = {
            notes: [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25], // Pentatonic scale C4-E5
            isPlaying: false,
            timer: null,
            audioCtx: null,
            
            start() {
                if (this.isPlaying) return;
                
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) {
                    console.warn("AudioContext is not supported on this browser.");
                    return;
                }

                try {
                    this.audioCtx = new AudioContextClass();
                    this.isPlaying = true;
                    
                    const playChord = () => {
                        if (!this.isPlaying) return;
                        
                        // Select 1 to 2 random notes to play together
                        const noteCount = 1 + Math.floor(Math.random() * 2);
                        for(let i=0; i<noteCount; i++) {
                            const freq = this.notes[Math.floor(Math.random() * this.notes.length)];
                            
                            const osc = this.audioCtx.createOscillator();
                            const gain = this.audioCtx.createGain();
                            const filter = this.audioCtx.createBiquadFilter();
                            
                            osc.type = 'sine'; // Pure sweet tone
                            osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);
                            
                            filter.type = 'lowpass';
                            filter.frequency.setValueAtTime(600, this.audioCtx.currentTime);
                            
                            gain.gain.setValueAtTime(0, this.audioCtx.currentTime);
                            // Soft chime attack and long release
                            gain.gain.linearRampToValueAtTime(0.04, this.audioCtx.currentTime + 0.15);
                            gain.gain.exponentialRampToValueAtTime(0.0001, this.audioCtx.currentTime + 4.0);
                            
                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(this.audioCtx.destination);
                            
                            osc.start();
                            osc.stop(this.audioCtx.currentTime + 4.2);
                        }
                        
                        // Next sound in 3-5 seconds
                        const delay = 3000 + Math.random() * 2500;
                        this.timer = setTimeout(playChord, delay);
                    };
                    
                    playChord();
                } catch(e) {
                    console.error("Web Audio Init failed", e);
                }
            },
            
            stop() {
                this.isPlaying = false;
                if (this.timer) clearTimeout(this.timer);
                if (this.audioCtx) {
                    this.audioCtx.close();
                    this.audioCtx = null;
                }
            }
        };

        // Text Speech Synthesizer with Highlighting
        const SpeechEngine = {
            ttsTimer: null,
            
            speak(text, onBoundary, onEnd) {
                this.stop();
                
                if (!Store.reader.speechSupported) {
                    // Fallback visual speaking timer
                    this.fallbackSpeak(text, onEnd);
                    return;
                }
                
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'vi-VN';
                // Adjust reading speed for a more natural, storytelling cadence
                utterance.rate = Store.currentScreen === 'bedtime' ? 0.82 : 0.90; // Slightly faster but still kid-friendly
                utterance.pitch = Store.currentScreen === 'bedtime' ? 0.95 : 1.0;
                
                // Prioritize best sounding Vietnamese voices
                const voices = window.speechSynthesis.getVoices();
                const viVoices = voices.filter(v => 
                    v.lang.toLowerCase().replace('_', '-').includes('vi-vn') || 
                    v.lang.toLowerCase().includes('vi')
                );
                
                if (viVoices.length > 0) {
                    // Score and sort to find the most premium neural voice
                    viVoices.sort((a, b) => {
                        const nameA = a.name.toLowerCase();
                        const nameB = b.name.toLowerCase();
                        
                        const getScore = (voice, name) => {
                            let score = 0;
                            // Network/remote voices (like Google neural voices) usually sound extremely natural
                            if (voice.localService === false) score += 10;
                            if (name.includes('natural') || name.includes('neural') || name.includes('multilingual')) score += 15;
                            if (name.includes('premium')) score += 8;
                            if (name.includes('linh') || name.includes('lan') || name.includes('tuan') || name.includes('an')) score += 6;
                            if (name.includes('google')) score += 5;
                            if (name.includes('microsoft')) score += 4;
                            return score;
                        };
                        
                        return getScore(b, nameB) - getScore(a, nameA);
                    });
                    
                    utterance.voice = viVoices[0];
                    console.log("Selected voice for narration:", viVoices[0].name);
                }
                
                utterance.onboundary = (e) => {
                    if (e.name === 'word') {
                        onBoundary(e.charIndex);
                    }
                };
                
                utterance.onend = () => {
                    onEnd();
                };
                
                utterance.onerror = (err) => {
                    console.error("Speech Synthesis Error", err);
                    onEnd(); // Fallback to complete normally
                };
                
                Store.reader.utterance = utterance;
                window.speechSynthesis.speak(utterance);
            },
            
            fallbackSpeak(text, onEnd) {
                const words = text.split(' ');
                let currentWordIndex = 0;
                const msPerWord = 400; // ~150 words per minute
                
                const tick = () => {
                    if (!Store.reader.isPlaying) return;
                    if (currentWordIndex >= words.length) {
                        onEnd();
                        return;
                    }
                    
                    // Approximate character index
                    const charIndex = words.slice(0, currentWordIndex).join(' ').length + (currentWordIndex > 0 ? 1 : 0);
                    Store.reader.highlightCharIndex = charIndex;
                    updateReaderTextDisplay();
                    
                    currentWordIndex++;
                    this.ttsTimer = setTimeout(tick, msPerWord);
                };
                
                tick();
            },
            
            pause() {
                if (Store.reader.speechSupported) {
                    window.speechSynthesis.pause();
                }
                if (this.ttsTimer) clearTimeout(this.ttsTimer);
            },
            
            resume(text, onBoundary, onEnd) {
                if (Store.reader.speechSupported) {
                    window.speechSynthesis.resume();
                } else {
                    this.fallbackSpeak(text, onEnd);
                }
            },
            
            stop() {
                if (Store.reader.speechSupported) {
                    window.speechSynthesis.cancel();
                }
                if (this.ttsTimer) clearTimeout(this.ttsTimer);
                Store.reader.highlightCharIndex = -1;
            }
        };

        // Navigation
        function navigateTo(screen, params = {}) {
            // Stop active narration
            SpeechEngine.stop();
            Store.reader.isPlaying = false;
            if (Store.reader.timer) clearInterval(Store.reader.timer);
            
            // Stop Bedtime synthesizers if leaving Bedtime mode
            if (Store.currentScreen === 'bedtime' && screen !== 'bedtime') {
                stopBedtimeTimer();
            }

            Store.currentScreen = screen;
            
            if (screen === 'age-hub') {
                Store.selectedAgeGroup = params.ageGroup;
            } else if (screen === 'detail') {
                Store.selectedStoryId = params.storyId;
            } else if (screen === 'reader') {
                const story = Store.stories.find(s => s.id === params.storyId);
                Store.reader.story = story;
                
                // Get saved reading progress
                let pageProgress = Store.readingProgress[story.id] || 0;
                if (story.pages && (pageProgress >= story.pages.length || pageProgress < 0)) {
                    pageProgress = 0;
                }
                Store.reader.currentPage = pageProgress;
                Store.reader.isPlaying = false;
                Store.reader.audioProgress = 0;
                Store.reader.audioTime = 0;
                Store.reader.highlightCharIndex = -1;
            } else if (screen === 'bedtime') {
                initBedtimePlaylist();
            }
            
            render();
        }

        // Toggle Search open
        function toggleSearch() {
            Store.isSearchOpen = !Store.isSearchOpen;
            if(!Store.isSearchOpen) Store.searchQuery = '';
            render();
            if(Store.isSearchOpen) {
                setTimeout(() => {
                    const input = document.getElementById('search-input');
                    if(input) input.focus();
                }, 100);
            }

        function handleSearch(val) {
            Store.searchQuery = val;
            render();
            const input = document.getElementById('search-input');
            if(input) {
                input.focus();
                input.setSelectionRange(val.length, val.length);

                                <div id="qa-panel-${idx}" class="hidden px-4 pb-3 border-t border-textSecondary/5 pt-2 text-[11px] text-textSecondary font-medium italic">

                arrow.style.transform = 'rotate(180deg)';

                panel.classList.add('hidden');
                arrow.style.transform = 'rotate(0deg)';

        // Auto-play audio when only-audio is clicked

        // ================= 4. STORYBOOK READER (EXPERIENCE 2) =================

            return `

                        <button onclick="exitReader()" class="w-10 h-10 flex items-center justify-center rounded-full ${isDarkReader ? 'bg-white/10 text-white' : 'bg-textPrimary/5 text-textPrimary'} active:scale-95 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">

                        <div class="${isDarkReader ? 'bg-white/10 text-white' : 'bg-honeyYellow/20 text-textPrimary'} text-[12px] font-bold px-3 py-1 rounded-full">
                            Trang <span id="reader-page-indicator">${pageNum}</span>/${totalPages}
                        </div>
                    </header>

                    <!-- Top Segmented Bar -->
                    <div class="w-full h-1.5 bg-black/5 flex px-0.5 gap-1 select-none">
                        ${progressDots}
                    </div>

                    <!-- Main Viewer Scroll Content -->
                    <main class="flex-1 overflow-y-auto pb-28 flex flex-col justify-start relative px-4 pt-3">
                        
                        <!-- Artwork / Page Viewer -->
                        <div class="w-full aspect-[4/3] ${isDarkReader ? 'bg-black/20' : 'bg-cardLight'} rounded-2xl overflow-hidden border ${isDarkReader ? 'border-white/5' : 'border-textSecondary/5'} shadow-sm relative flex items-center justify-center group mb-4">
                            
                            <!-- Simulated Shimmer Loading Screen -->
                            <div id="reader-shimmer" class="absolute inset-0 bg-gradient-to-br ${isDarkReader ? 'from-[#2a1e3f] to-[#17213a]' : 'from-honeyYellow/10 to-softEarthPink/10'} flex flex-col items-center justify-center p-6 text-center z-10 transition-opacity duration-300 hidden">
                                <div class="w-12 h-12 rounded-full border-4 border-honeyYellow border-t-transparent animate-spin mb-3"></div>
                                <p class="text-xs text-textSecondary font-semibold">Tải tranh vẽ Bảo Bối...</p>
                            </div>
                            
                            <!-- Render PDF Page image / SVG mockup -->
                            <img id="reader-artwork-image" src="${currentPageData.image}" alt="Page Artwork" class="w-full h-full object-cover cursor-pointer" onclick="handleArtworkClick(event)">
                            
                            <!-- Image Zoom button -->
                            <button onclick="toggleImageZoom()" class="absolute bottom-3 right-3 p-2 rounded-xl bg-black/60 text-white backdrop-blur-sm active:scale-95 transition-transform">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75v4.5m0-4.5h-4.5m4.5 0L15 9m5.25 11.25v-4.5m0 4.5h-4.5m4.5 0L15 15" />
                                </svg>
                            </button>
                        </div>

                        <!-- Story Text Card with Controllers -->
                        <div id="reader-text-card" class="rounded-2xl p-5 ${cardBg} transition-all duration-300 relative select-none">
                            
                            <!-- Font & Show controls overlay -->
                            <div class="absolute -top-3 right-4 flex gap-1 ${isDarkReader ? 'bg-white/10' : 'bg-textPrimary'} text-white rounded-lg p-0.5 text-[10px] font-bold shadow-md z-10">
                                <button onclick="cycleTextSize()" class="px-2.5 py-0.5 bg-honeyYellow text-textPrimary rounded-md">AA+</button>
                                <button onclick="toggleTextVisibility()" class="px-2 py-0.5 opacity-80" id="btn-toggle-text">Ẩn Chữ</button>

                                ${formatHighlightedText(currentPageData.text)}
                            </p>
                        </div>

                        <!-- Manual Page buttons -->
                        <div class="flex justify-between items-center mt-6 gap-4 mb-6">
                            <button onclick="prevReaderPage()" class="flex-1 h-12 rounded-2xl ${isDarkReader ? 'bg-white/10 text-white' : 'bg-textSecondary/10 text-textSecondary'} font-bold text-sm flex items-center justify-center gap-2 active:scale-95 transition-transform" ${reader.currentPage === 0 ? 'disabled opacity-30' : ''}>
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                                </svg>
                                Trang trước
                            </button>
                            <button onclick="nextReaderPage()" class="flex-1 h-12 rounded-2xl ${isDarkReader ? 'bg-white text-[#17213A]' : 'bg-textPrimary text-white'} font-bold text-sm flex items-center justify-center gap-2 active:scale-95 transition-transform">
                                ${reader.currentPage === totalPages - 1 ? 'Kết thúc' : 'Trang sau'}
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                                </svg>
                            </button>
                        </div>

                    </main>

                    <!-- Sticky Bottom Player -->
                    <footer class="absolute bottom-0 left-0 right-0 h-24 glass-player flex flex-col justify-center px-4 pb-2 z-20 select-none">
                        
                        <!-- Auto-Flip toggle indicator -->
                        <div class="absolute -top-6 left-4 bg-honeyYellow text-textPrimary text-[9px] font-extrabold px-2 py-0.5 rounded-full flex items-center gap-1 shadow">
                            <input type="checkbox" id="auto-flip-checkbox" ${reader.isAutoFlip ? 'checked' : ''} onchange="toggleAutoFlip(this.checked)" class="w-2.5 h-2.5 rounded accent-textPrimary">
                            <label for="auto-flip-checkbox">Tự động lật trang</label>
                        </div>
                        
                        <div class="w-full flex items-center justify-between gap-2 mb-1 px-1">
                            <span id="player-time-current" class="text-[10px] font-bold text-textSecondary min-w-[32px]">${formatAudioTime(reader.audioTime)}</span>
                            <div class="flex-1 h-2 bg-textPrimary/10 rounded-full relative cursor-pointer" onclick="seekAudio(event)">
                                <div id="reader-progress-bar" class="absolute top-0 left-0 h-full bg-honeyYellow rounded-full" style="width: ${reader.audioProgress}%; transition: width 0.1s linear;"></div>
                                <div id="reader-progress-dot" class="absolute top-1/2 -translate-y-1/2 w-3.5 h-3.5 bg-textPrimary border-2 border-white rounded-full shadow-md transform scale-100 active:scale-125 transition-transform" style="left: calc(${reader.audioProgress}% - 7px); transition: left 0.1s linear;"></div>
                            </div>
                            <span id="player-time-total" class="text-[10px] font-bold text-textSecondary min-w-[32px] text-right">${formatAudioTime(reader.audioDuration)}</span>
                        </div>

                        <div class="w-full flex items-center justify-center gap-8">
                            <button onclick="rewindAudio()" class="p-2 text-textPrimary active:scale-75 transition-transform" title="Lùi 10 giây">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 19.5L12 12l7.5-7.5" />
                                </svg>
                            </button>

                            <button onclick="toggleReaderAudio()" class="w-14 h-14 rounded-full bg-honeyYellow text-textPrimary flex items-center justify-center shadow-md active:scale-95 transition-all border-4 border-white hover:shadow-honeyYellow/30 hover:shadow-lg" title="Phát / Tạm dừng" id="btn-reader-play">
                                ${reader.isPlaying ? `
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" class="w-6 h-6">
                                        <path fill-rule="evenodd" d="M6.75 5.25a.75.75 0 0 1 .75-.75H9a.75.75 0 0 1 .75.75v13.5a.75.75 0 0 1-.75.75H7.5a.75.75 0 0 1-.75-.75V5.25Zm7.5 0a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 .75.75v13.5a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1-.75-.75V5.25Z" clip-rule="evenodd" />
                                    </svg>
                                ` : `
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" class="w-6 h-6 ml-1">
                                        <path fill-rule="evenodd" d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.991c-1.25.687-2.779-.217-2.779-1.643V5.653z" clip-rule="evenodd" />
                                    </svg>
                                `}
                            </button>

                            <button onclick="forwardAudio()" class="p-2 text-textPrimary active:scale-75 transition-transform" title="Tiến 10 giây">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 4.5l7.5 7.5-7.5 7.5" />
                                </svg>
                            </button>
                        </div>
                    </footer>

                    <!-- Congratulatory Screen overlay (Initially hidden) -->
                    <div id="reader-congrats-overlay" class="absolute inset-0 bg-[#FFF4D8] z-30 flex-col items-center justify-center p-6 text-center select-none hidden opacity-0 transition-opacity duration-500">
                        <div class="w-24 h-24 rounded-full bg-honeyYellow/20 flex items-center justify-center text-5xl mb-4 border border-honeyYellow/30 animate-bounce">
                            🎉
                        </div>
                        <h2 class="text-2xl font-black text-textPrimary mb-2 leading-tight">Hoàn Thành Cuốn Sách!</h2>
                        <p class="text-sm text-textSecondary font-semibold mb-6">Bé đã mở khóa thành công một phần thưởng học tập đặc biệt:</p>
                        
                        <div class="bg-cardLight p-5 rounded-2xl border-2 border-honeyYellow/30 shadow-md mb-8 inline-flex flex-col items-center max-w-[260px] animate-pulse">
                            <span class="text-5xl block mb-2" id="congrats-badge-icon">🏆</span>
                            <span class="text-sm font-bold text-textPrimary" id="congrats-badge-name">Huy hiệu Dũng Cảm</span>
                            <span class="text-[10px] text-textSecondary mt-1 font-bold">Đã mở khóa ngày hôm nay</span>
                        </div>

                        <div class="flex flex-col gap-2.5 w-full max-w-[240px]">
                            <button onclick="replayReaderStory()" class="w-full py-3 rounded-xl bg-honeyYellow text-textPrimary font-bold text-sm shadow active:scale-95 transition-transform">
                                🎧 Đọc lại từ đầu
                            </button>
                            <button onclick="exitReader()" class="w-full py-3 rounded-xl bg-textPrimary text-white font-bold text-sm shadow active:scale-95 transition-transform">
                                🏡 Trở về Trang chủ
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function getTextSizeClass() {
            if(Store.reader.textSize === 'md') return 'text-base';
            if(Store.reader.textSize === 'xl') return 'text-2xl';
            return 'text-lg'; // lg default
        }

        // Format narrative text with highlight tags
        function formatHighlightedText(text) {
            if (!text) return '';
            if (Store.reader.highlightCharIndex === -1) return text;
            
            // Highlight word boundaries
            const charIdx = Store.reader.highlightCharIndex;
            
            // Find word starting at charIdx or nearest following space
            let wordStart = charIdx;
            let wordEnd = text.indexOf(' ', wordStart);
            if (wordEnd === -1) wordEnd = text.length;
            
            const before = text.substring(0, wordStart);
            const word = text.substring(wordStart, wordEnd);
            const after = text.substring(wordEnd);
            
            return `${before}<span class="bg-[#f6c65b]/50 border-b-2 border-honeyYellow px-0.5 rounded font-bold text-textPrimary transition-all duration-150">${word}</span>${after}`;
        }

        // Update just the text container to avoid image reload flickering
        function updateReaderTextDisplay() {
            const textElement = document.getElementById('reader-story-text');
            if (textElement && Store.reader.story) {
                const pages = Store.reader.story.pages;
                if (Store.reader.currentPage >= pages.length) {
                    Store.reader.currentPage = 0;
                }
                const currentPageData = pages[Store.reader.currentPage];
                if (currentPageData && currentPageData.text) {
                    textElement.innerHTML = formatHighlightedText(currentPageData.text);
                } else {
                    textElement.innerHTML = '';
                }
            }
        }

        // Text controller operations
        function cycleTextSize() {
            const sizes = ['md', 'lg', 'xl'];
            let idx = sizes.indexOf(Store.reader.textSize);
            idx = (idx + 1) % sizes.length;
            Store.reader.textSize = sizes[idx];
            
            const card = document.getElementById('reader-story-text');
            if (card) {
                card.className = `font-medium leading-relaxed text-center leading-[1.65] duration-200 font-vietnam ${getTextSizeClass()}`;
            }
        }
        function toggleTextVisibility() {
            Store.reader.isTextHidden = !Store.reader.isTextHidden;
            const btn = document.getElementById('btn-toggle-text');
            const cardText = document.getElementById('reader-story-text');
            
            if (Store.reader.isTextHidden) {
                btn.textContent = 'Hiện Chữ';
                btn.classList.add('bg-honeyYellow');
                btn.classList.add('text-textPrimary');
                if (cardText) cardText.classList.add('invisible');
            } else {
                btn.textContent = 'Ẩn Chữ';
                btn.classList.remove('bg-honeyYellow');
                btn.classList.remove('text-textPrimary');
                if (cardText) cardText.classList.remove('invisible');
            }
        }

        // Swipe / Tap gesture on artwork
        function handleArtworkClick(e) {
            const rect = e.target.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.right - rect.left;
            
            if (clickX < width * 0.35) {
                prevReaderPage(); // Left 35% click = prev
            } else {
                nextReaderPage(); // Right 65% click = next
            }
        }

        // Zoom/Theatre Layout toggle
        function toggleImageZoom() {
            const viewContainer = document.getElementById('reader-view-container');
            const main = viewContainer.querySelector('main');
            if (main.classList.contains('px-4')) {
                main.classList.remove('px-4', 'pt-3');
                main.querySelector('main > div').classList.remove('rounded-2xl', 'mb-4');
                main.querySelector('main > div').classList.add('rounded-none');
            } else {
                main.classList.add('px-4', 'pt-3');
                main.querySelector('main > div').classList.add('rounded-2xl', 'mb-4');
                main.querySelector('main > div').classList.remove('rounded-none');
            }
        }

        // Page navigation in Reader
        function prevReaderPage() {
            if (Store.reader.currentPage > 0) {
                // Show simulated shimmer loader
                const shimmer = document.getElementById('reader-shimmer');
                if(shimmer) {
                    shimmer.classList.remove('hidden');
                    setTimeout(() => shimmer.classList.add('hidden'), 250);
                }

                Store.reader.currentPage--;
                Store.reader.audioProgress = 0;
                Store.reader.audioTime = 0;
                Store.reader.highlightCharIndex = -1;
                
                saveProgress(Store.reader.story.id, Store.reader.currentPage);
                
                // If it was playing, restart narration for the new page
                if (Store.reader.isPlaying) {
                    playNarrator();
                } else {
                    render();
                }
            }
        }

        function nextReaderPage() {
            const totalPages = Store.reader.story.pages.length;
            
            if (Store.reader.currentPage < totalPages - 1) {
                // Show simulated shimmer loader
                const shimmer = document.getElementById('reader-shimmer');
                if(shimmer) {
                    shimmer.classList.remove('hidden');
                    setTimeout(() => shimmer.classList.add('hidden'), 250);
                }

                Store.reader.currentPage++;
                Store.reader.audioProgress = 0;
                Store.reader.audioTime = 0;
                Store.reader.highlightCharIndex = -1;
                
                saveProgress(Store.reader.story.id, Store.reader.currentPage);
                
                if (Store.reader.isPlaying) {
                    playNarrator();
                } else {
                    render();
                }
            } else {
                // End of story reached!
                finishStoryExperience();
            }
        }

        function finishStoryExperience() {
            SpeechEngine.stop();
            if (Store.reader.timer) clearInterval(Store.reader.timer);
            Store.reader.isPlaying = false;
            
            // Mark as 100% complete
            saveProgress(Store.reader.story.id, Store.reader.story.pages.length - 1);
            
            // Unlock badge
            unlockBadge(Store.reader.story.badge, Store.reader.story.badgeIcon);
            
            // Show congrats screen overlay
            const overlay = document.getElementById('reader-congrats-overlay');
            const badgeIcon = document.getElementById('congrats-badge-icon');
            const badgeName = document.getElementById('congrats-badge-name');
            
            if (overlay && badgeIcon && badgeName) {
                badgeIcon.textContent = Store.reader.story.badgeIcon;
                badgeName.textContent = Store.reader.story.badge;
                overlay.classList.remove('hidden');
                setTimeout(() => {
                    overlay.classList.add('flex');
                    overlay.classList.add('opacity-100');
                }, 50);
            }
        }

        function replayReaderStory() {
            const overlay = document.getElementById('reader-congrats-overlay');
            if (overlay) {
                overlay.classList.remove('flex', 'opacity-100');
                overlay.classList.add('hidden');
            }
            Store.reader.currentPage = 0;
            Store.reader.audioProgress = 0;
            Store.reader.audioTime = 0;
            Store.reader.highlightCharIndex = -1;
            saveProgress(Store.reader.story.id, 0);
            navigateTo('reader', {storyId: Store.reader.story.id});
        }

        function exitReader() {
            SpeechEngine.stop();
            if (Store.reader.timer) clearInterval(Store.reader.timer);
            Store.reader.isPlaying = false;
            
            // Back to details or home
            navigateTo('detail', {storyId: Store.reader.story.id});
        }

        // Auto flip mode setter
        function toggleAutoFlip(checked) {
            Store.reader.isAutoFlip = checked;
        }

        // Timeline Seek
        function seekAudio(e) {
            if(!Store.reader.isPlaying && Store.reader.audioTime === 0) return;
            
            const rect = e.target.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.right - rect.left;
            let pct = clickX / width;
            if(pct < 0) pct = 0;
            if(pct > 1) pct = 1;
            
            Store.reader.audioTime = Math.round(pct * Store.reader.audioDuration);
            Store.reader.audioProgress = pct * 100;
            
            // Simply restart narration from this point or estimate speak progress
            if (Store.reader.isPlaying) {
                playNarrator();
            } else {
                render();
            }
        }

        // Rewind & Fast Forward operations
        function rewindAudio() {
            Store.reader.audioTime = Math.max(0, Store.reader.audioTime - 10);
            Store.reader.audioProgress = (Store.reader.audioTime / Store.reader.audioDuration) * 100;
            if (Store.reader.isPlaying) {
                playNarrator();
            } else {
                render();
            }
        }
        function forwardAudio() {
            Store.reader.audioTime = Math.min(Store.reader.audioDuration, Store.reader.audioTime + 10);
            Store.reader.audioProgress = (Store.reader.audioTime / Store.reader.audioDuration) * 100;
            if (Store.reader.isPlaying) {
                playNarrator();
            } else {
                render();
            }
        }

        // Play/Pause toggler
        function toggleReaderAudio() {
            const playBtn = document.getElementById('btn-reader-play');
            
            if (Store.reader.isPlaying) {
                // Pause it
                Store.reader.isPlaying = false;
                SpeechEngine.pause();
                if (Store.reader.timer) clearInterval(Store.reader.timer);
                
                // Re-render button only to prevent image flash
                if(playBtn) {
                    playBtn.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" class="w-6 h-6 ml-1">
                            <path fill-rule="evenodd" d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.991c-1.25.687-2.779-.217-2.779-1.643V5.653z" clip-rule="evenodd" />
                        </svg>
                    `;
                }
            } else {
                // Play it
                Store.reader.isPlaying = true;
                playNarrator();
                
                if(playBtn) {
                    playBtn.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" class="w-6 h-6">
                            <path fill-rule="evenodd" d="M6.75 5.25a.75.75 0 0 1 .75-.75H9a.75.75 0 0 1 .75.75v13.5a.75.75 0 0 1-.75.75H7.5a.75.75 0 0 1-.75-.75V5.25Zm7.5 0a.75.75 0 0 1 .75-.75h1.5a.75.75 0 0 1 .75.75v13.5a.75.75 0 0 1-.75.75h-1.5a.75.75 0 0 1-.75-.75V5.25Z" clip-rule="evenodd" />
                        </svg>
                    `;
                }
            }
        }

        // Speaking coordinator
        function playNarrator() {
            if (Store.reader.timer) clearInterval(Store.reader.timer);
            
            if (!Store.reader.story || !Store.reader.story.pages) return;
            const pages = Store.reader.story.pages;
            if (Store.reader.currentPage >= pages.length || Store.reader.currentPage < 0) {
                Store.reader.currentPage = 0;
            }
            
            const currentPageData = pages[Store.reader.currentPage];
            if (!currentPageData) return;
            const textToSpeak = currentPageData.text;
            
            // Start speaking with SpeechSynthesis
            SpeechEngine.speak(
                textToSpeak, 
                // Boundary highlight update
                (charIndex) => {
                    Store.reader.highlightCharIndex = charIndex;
                    updateReaderTextDisplay();
                },
                // Finished speaking current page
                () => {
                    Store.reader.audioProgress = 100;
                    Store.reader.audioTime = Store.reader.audioDuration;
                    renderProgressDisplayOnly();
                    
                    if (Store.reader.isAutoFlip) {
                        // Sleep 1.5 seconds and flip to next page
                        setTimeout(() => {
                            if (Store.reader.isPlaying) nextReaderPage();
                        }, 1500);
                    } else {
                        Store.reader.isPlaying = false;
                        updatePlayButtonToPlayState();
                    }
                }
            );

            // Simulating seek progress bar
            const startTime = Date.now() - (Store.reader.audioTime * 1000);
            Store.reader.timer = setInterval(() => {
                const elapsed = Math.round((Date.now() - startTime) / 1000);
                if (elapsed <= Store.reader.audioDuration) {
                    Store.reader.audioTime = elapsed;
                    Store.reader.audioProgress = (elapsed / Store.reader.audioDuration) * 100;
                    renderProgressDisplayOnly();
                } else {
                    clearInterval(Store.reader.timer);
                }
            }, 500);
        }

        function renderProgressDisplayOnly() {
            const bar = document.getElementById('reader-progress-bar');
            const dot = document.getElementById('reader-progress-dot');
            const timeVal = document.getElementById('player-time-current');
            
            if (bar && dot && timeVal) {
                bar.style.width = `${Store.reader.audioProgress}%`;
                dot.style.left = `calc(${Store.reader.audioProgress}% - 7px)`;
                timeVal.textContent = formatAudioTime(Store.reader.audioTime);
            }
        }

        function updatePlayButtonToPlayState() {
            const playBtn = document.getElementById('btn-reader-play');
            if (playBtn) {
                playBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" class="w-6 h-6 ml-1">
                        <path fill-rule="evenodd" d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.991c-1.25.687-2.779-.217-2.779-1.643V5.653z" clip-rule="evenodd" />
                    </svg>
                `;
            }
        }

        function formatAudioTime(secs) {
            const m = Math.floor(secs / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // ================= 5. BEDTIME MODE (EXPERIENCE 5) =================

        // Bedtime Playlist controller
        function prevBedtimeStory() {
            if (Store.bedtime.playlist.length <= 1) return;
            stopBedtimeSpeech();
            Store.bedtime.currentStoryIndex = (Store.bedtime.currentStoryIndex - 1 + Store.bedtime.playlist.length) % Store.bedtime.playlist.length;
            if (Store.bedtime.isPlaying) startBedtimeSpeech();
            render();
        }
        function nextBedtimeStory() {
            if (Store.bedtime.playlist.length <= 1) return;
            stopBedtimeSpeech();
            Store.bedtime.currentStoryIndex = (Store.bedtime.currentStoryIndex + 1) % Store.bedtime.playlist.length;
            if (Store.bedtime.isPlaying) startBedtimeSpeech();
            render();
        }

        // Toggles sleep playlist filters
        function setBedtimeFilter(type, val) {
            Store.bedtime[type] = val;
            initBedtimePlaylist();
            render();
        }

        // Bedtime TTS/Synth triggers
        function toggleBedtimePlay() {
            if (Store.bedtime.isPlaying) {
                // Pause Bedtime
                Store.bedtime.isPlaying = false;
                stopBedtimeSpeech();
                BedtimeSynth.stop();
            } else {
                // Play Bedtime
                Store.bedtime.isPlaying = true;
                startBedtimeSpeech();
                BedtimeSynth.start();
            }
            render();
        }

        function startBedtimeSpeech() {
            const currentStory = Store.bedtime.playlist[Store.bedtime.currentStoryIndex];
            if (!currentStory || !currentStory.pages) return;

            // Soft whispering storyteller speech trigger
            let allText = currentStory.pages.map(p => p.text).join("... ");
            
            SpeechEngine.speak(
                allText,
                (charIdx) => {}, // Word highlight not required on Bedtime visual screen
                () => {
                    // Loop to next story in playlist
                    nextBedtimeStory();
                }
            );
        }

        function stopBedtimeSpeech() {
            SpeechEngine.stop();
        }

        // Sleep Timer Manager
        function setSleepTimer(seconds) {
            cancelSleepTimer();
            Store.bedtime.timerSeconds = seconds;
            
            // Start countdown
            Store.bedtime.timerInterval = setInterval(() => {
                if (Store.bedtime.timerSeconds > 0) {
                    Store.bedtime.timerSeconds--;
                    const display = document.getElementById('sleep-timer-display');
                    if (display) display.textContent = `Dừng sau ${formatAudioTime(Store.bedtime.timerSeconds)}`;
                } else {
                    // Time is up! Shutdown everything
                    stopBedtimeTimer();
                }
            }, 1000);
            
            render();
        }

        function cancelSleepTimer() {
            if (Store.bedtime.timerInterval) clearInterval(Store.bedtime.timerInterval);
            Store.bedtime.timerSeconds = 0;
            const display = document.getElementById('sleep-timer-display');
            if (display) display.textContent = 'Chưa bật';
        }

        function stopBedtimeTimer() {
            cancelSleepTimer();
            Store.bedtime.isPlaying = false;
            stopBedtimeSpeech();
            BedtimeSynth.stop();
            render();
        }

                        <div class="flex gap-3">

                        </div>

                        <!-- Story Pages Builder -->
                        <div class="border-t border-textSecondary/10 pt-4">
                            <div class="flex justify-between items-center mb-2">
                                <h4 class="text-xs font-bold text-textPrimary">Danh sách trang truyện</h4>
                                <button onclick="addAdminFormPage()" class="text-[10px] font-bold text-honeyYellow bg-textPrimary px-2.5 py-1.5 rounded-lg active:scale-95 transition-all">+ Thêm trang</button>
                            </div>

                            <div class="space-y-3" id="admin-pages-container">
                                ${form.pages.map((p, idx) => `
                                    <div class="bg-textPrimary/5 p-3 rounded-xl space-y-2 border border-textSecondary/5">
                                        <div class="flex justify-between items-center">
                                            <span class="text-[10px] font-bold text-textSecondary">Trang ${idx + 1}</span>
                                            ${form.pages.length > 1 ? `
                                                <button onclick="removeAdminFormPage(${idx})" class="text-[9px] font-bold text-red-500">Xóa</button>
                                            ` : ''}
                                        </div>
                                        <div class="flex gap-2">
                                            <div class="w-14">
                                                <label class="block text-[9px] font-bold text-textSecondary mb-0.5">Icon Tranh</label>
                                                <input type="text" value="${p.imageSvgText}" oninput="updateAdminPageField(${idx}, 'imageSvgText', this.value)" class="w-full text-center px-1 py-1 text-xs border border-textSecondary/20 rounded-lg focus:outline-none">
                                            </div>
                                            <div class="flex-1">
                                                <label class="block text-[9px] font-bold text-textSecondary mb-0.5">Chữ hiển thị</label>
                                                <textarea oninput="updateAdminPageField(${idx}, 'text', this.value)" placeholder="Lời kể truyện..." rows="2" class="w-full px-2 py-1 text-xs border border-textSecondary/20 rounded-lg focus:outline-none focus:border-honeyYellow">${p.text}</textarea>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Action Submit -->
                        <button onclick="publishNewStory()" class="w-full h-11 bg-honeyYellow text-textPrimary font-bold text-xs rounded-xl shadow active:scale-[0.98] transition-all">
                            🚀 Lưu & Đăng truyện lên Thư viện
                        </button>
                    </div>
                </div>
            `;
        }

        // Form fields bindings
        function updateAdminForm(key, val) {
            Store.adminForm[key] = val;
        }

        function updateAdminPageField(pageIdx, key, val) {
            Store.adminForm.pages[pageIdx][key] = val;
        }

        function addAdminFormPage() {
            Store.adminForm.pages.push({ text: '', imageSvgText: '🧸' });
            render();
        }

        function removeAdminFormPage(pageIdx) {
            if (Store.adminForm.pages.length > 1) {
                Store.adminForm.pages.splice(pageIdx, 1);
                render();
            }
        }

        // Save new story to LocalStorage memory
        function publishNewStory() {
            const form = Store.adminForm;
            if(!form.title || !form.summary) {
                alert("Vui lòng điền đầy đủ Tiêu đề và Tóm tắt truyện!");
                return;
            }

            // Build page arrays
            const formattedPages = form.pages.map((p, idx) => {
                const svgText = p.imageSvgText || '📖';
                // Build cute dynamic SVGs dynamically based on the emoji typed by admin
                const dynamicSvg = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='600' viewBox='0 0 800 600'><rect width='100%' height='100%' fill='%23FFF9EE'/><text x='50%' y='40%' font-size='100' text-anchor='middle'>${svgText}</text><text x='50%' y='65%' font-size='28' font-family='sans-serif' font-weight='bold' fill='%231f2430' text-anchor='middle'>Trang Truyện Số ${idx + 1}</text></svg>`;
                return {
                    image: dynamicSvg,
                    text: p.text || `Nội dung lời kể cho trang ${idx + 1} của truyện.`
                };
            });

            const newId = 'custom_' + Date.now();
            const newStory = {
                id: newId,
                title: form.title,
                ageGroup: form.ageGroup,
                author: form.author || 'Danh nhân',
                duration: form.duration || '5 phút',
                cover: formattedPages[0].image,
                tags: [`🧸 ${form.ageGroup} tuổi`, `📖 ${formattedPages.length} trang`, `⏱️ ${form.duration}`],
                summary: form.summary,
                pedagogy: [
                    'Truyện tự biên soạn tăng tính độc lập và sáng tạo riêng.',
                    'Dễ dàng tùy biến lời thoại để phù hợp nhất với con.',
                    'Có thể thay đổi và bổ sung tranh vẽ linh hoạt.'
                ],
                questions: [
                    'Con thích nhất nhân vật nào trong câu chuyện vừa rồi?',
                    'Nếu con được đặt lại tên truyện, con sẽ đặt tên là gì?',
                    'Câu chuyện này mang lại bài học gì bổ ích cho con?'
                ],
                badge: '🏆 Huy hiệu Tự Lập',
                badgeIcon: '✨',
                pages: formattedPages
            };

            // Save custom list
            const custom = localStorage.getItem('bb_custom_stories');
            let customList = [];
            if(custom) {
                try {
                    customList = JSON.parse(custom);
                } catch(e) {}
            }
            if (!Array.isArray(customList)) customList = [];
            customList.push(newStory);
            localStorage.setItem('bb_custom_stories', JSON.stringify(customList));

            // Reload DB
            loadCustomStories();

            // Clear form state
            Store.adminForm = {
                title: '',
                ageGroup: '5-8',
                author: '',
                duration: '5 phút',
                summary: '',
                pages: [{ text: '', imageSvgText: '🧸' }]
            };

            alert("Đăng truyện thành công! Truyện của chị đã có mặt ngoài Trang chủ.");
            navigateTo('home');
        }

        function deleteCustomStory(id) {
            if(confirm("Chị có chắc chắn muốn xóa cuốn truyện tự tạo này khỏi danh sách?")) {
                const custom = localStorage.getItem('bb_custom_stories');
                if (custom) {
                    try {
                        let customList = JSON.parse(custom);
                        if (Array.isArray(customList)) {
                            customList = customList.filter(s => s.id !== id);
                            localStorage.setItem('bb_custom_stories', JSON.stringify(customList));
                        }
                        
                        // Clear reading history for deleted story
                        if(Store.readingProgress[id] !== undefined) {
                            delete Store.readingProgress[id];
                            localStorage.setItem('bb_progress', JSON.stringify(Store.readingProgress));
                        }
                        
                        loadCustomStories();
                        render();
                    } catch(e) {}
                }
            }
        }

        // ================= VIEW STATE RENDER MANAGER =================
        function render() {
            const container = document.getElementById('app-container');
            if (!container) return;

            // Page Background styling togglers
            if (Store.currentScreen === 'bedtime') {
                container.className = "w-full max-w-[390px] h-screen sm:h-[844px] bg-nightLibrary shadow-2xl relative flex flex-col overflow-hidden sm:rounded-[32px] sm:border-8 sm:border-[#1f2430] transition-colors duration-500";
            } else if (Store.currentScreen === 'reader') {
                const isDark = Store.reader.story && Store.reader.story.ageGroup === '12-15';
                container.className = `w-full max-w-[390px] h-screen sm:h-[844px] ${isDark ? 'bg-nightLibrary' : 'bg-[#FFF4D8]'} shadow-2xl relative flex flex-col overflow-hidden sm:rounded-[32px] sm:border-8 sm:border-[#1f2430] transition-colors duration-500`;
            } else {
                container.className = "w-full max-w-[390px] h-screen sm:h-[844px] bg-[#FFF4D8] shadow-2xl relative flex flex-col overflow-hidden sm:rounded-[32px] sm:border-8 sm:border-[#1f2430] transition-colors duration-500";
            }

            let html = '';
            
            // Layout assembly
            if (Store.currentScreen !== 'reader') {
                html += renderHeader();
            }

            if (Store.currentScreen !== 'reader') {
                html += '<main class="flex-1 overflow-y-auto pb-20 flex flex-col justify-start">';
            }

            switch(Store.currentScreen) {
                case 'home':
                    html += renderHomeScreen();
                    break;
                case 'age-hub':
                    html += renderAgeGateScreen();
                    break;
                case 'detail':
                    html += renderDetailScreen();
                    break;
                case 'reader':
                    html = renderReaderScreen();
                    break;
                case 'bedtime':
                    html += renderBedtimeScreen();
                    break;
                case 'library':
                    html += renderLibraryScreen();
                    break;
                case 'admin':
                    html += renderAdminScreen();
                    break;
            }

            if (Store.currentScreen !== 'reader') {
                html += '</main>';
                html += renderBottomNav();
            }

            container.innerHTML = html;
        }

        // Initialize App
        loadCustomStories();
        render();

    </script>
</body>
</html>
